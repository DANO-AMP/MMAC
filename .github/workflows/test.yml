name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Swift Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cd SysMac && swift build

      - name: Run tests
        run: cd SysMac && swift test --filter SysMacTests
