<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- Sparkle/Star shape representing optimization -->
  <g transform="translate(256, 256)">
    <!-- Main sparkle -->
    <path d="M0 -120 L30 -30 L120 0 L30 30 L0 120 L-30 30 L-120 0 L-30 -30 Z"
          fill="url(#sparkGrad)"
          opacity="0.95"/>

    <!-- Inner circle -->
    <circle r="40" fill="#0ea5e9"/>
    <circle r="30" fill="white"/>

    <!-- Small sparkles -->
    <g opacity="0.7">
      <circle cx="80" cy="-80" r="12" fill="white"/>
      <circle cx="-90" cy="70" r="8" fill="white"/>
      <circle cx="70" cy="90" r="10" fill="white"/>
    </g>
  </g>

  <!-- Speed lines -->
  <g stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5">
    <line x1="380" y1="130" x2="420" y2="90"/>
    <line x1="400" y1="160" x2="440" y2="130"/>
    <line x1="90" y1="380" x2="130" y2="350"/>
  </g>
</svg>
